<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Gallery | IEEE SB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#0b0720;
  color:white;
  padding:40px;
}
.container{
  max-width:500px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:12px;
}
input, button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
}
button{
  background:linear-gradient(135deg,#430ebe,#bb4dea);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{opacity:.9}
</style>
</head>

<body>

<div class="container">
  <h2>Add Gallery Image</h2>

  <input type="file" id="imageInput">
  <input type="text" id="captionInput" placeholder="Caption (optional)">
  <button onclick="uploadImage()">Upload</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 USE SAME CONFIG AS event.html
const firebaseConfig = {
  apiKey: "AIzaSyBMYyLQAu50cUHuXpHrYartoL2hr2nLiMo",
  authDomain: "ieee-visat-website.firebaseapp.com",
  projectId: "ieee-visat-website",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.uploadImage = async function(){

  const file = document.getElementById("imageInput").files[0];
  const caption = document.getElementById("captionInput").value;

  if(!file){
    alert("Select image first");
    return;
  }

  // Upload to Cloudinary
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "ieee_gallery");

  const response = await fetch(
    "https://api.cloudinary.com/v1_1/dnbbyeel3/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await response.json();

  if(!data.secure_url){
    alert("Cloudinary upload failed");
    console.log(data);
    return;
  }

  // Save to Firestore
  await addDoc(collection(db, "gallery"), {
    imageUrl: data.secure_url,
    caption: caption,
    createdAt: serverTimestamp()
  });

  alert("Gallery image added successfully!");

};

</script>

</body>
</html>
