<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Events | IEEE SB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#070019;
  color:#e5e7eb;
  padding:40px;
}

h1{
  margin-bottom:30px;
  color:#a855f7;
}

.form-box{
  background:rgba(124,58,237,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(168,85,247,0.2);
  padding:25px;
  border-radius:20px;
  margin-bottom:40px;
}

.form-box h3{
  margin-bottom:15px;
  color:#a855f7;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#5b21b6,#7c3aed);
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.event-card{
  background:rgba(124,58,237,0.08);
  border:1px solid rgba(168,85,247,0.2);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}

.event-card img{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.delete-btn{
  background:#ff4d6d;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>Event Management</h1>

<div class="form-box">
  <h3>Add New Event</h3>

  <input type="text" id="title" placeholder="Event Title">
  <input type="date" id="date">
  <textarea id="description" placeholder="Event Description"></textarea>
  <input type="text" id="registration" placeholder="Registration Link (optional)">
  <input type="file" id="imageFile">
  <button id="addEvent">Add Event</button>
</div>

<h3>All Events</h3>
<div id="eventList"></div>

<script type="module">

import app from "./firebase.js";

import { 
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  deleteDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { 
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* 🔒 Protect Page */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

const eventList = document.getElementById("eventList");

/* ================= LOAD EVENTS ================= */

async function loadEvents(){
  eventList.innerHTML = "";
  const snapshot = await getDocs(collection(db,"events"));

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    const div = document.createElement("div");
    div.classList.add("event-card");

    div.innerHTML = `
      ${data.image ? `<img src="${data.image}">` : ""}
      <h4>${data.title}</h4>
      <p><strong>Date:</strong> ${data.date}</p>
      <p>${data.description || ""}</p>
      <button class="delete-btn" data-id="${docSnap.id}">Delete</button>
    `;

    eventList.appendChild(div);
  });

  document.querySelectorAll(".delete-btn").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const id = btn.getAttribute("data-id");
      await deleteDoc(doc(db,"events",id));
      loadEvents();
    });
  });
}

loadEvents();

/* ================= ADD EVENT ================= */

document.getElementById("addEvent").addEventListener("click", async ()=>{

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const description = document.getElementById("description").value;
  const registration = document.getElementById("registration").value;
  const file = document.getElementById("imageFile").files[0];

  if(!title || !date){
    alert("Title and Date required");
    return;
  }

  let imageURL = "";

  if(file){
    const storageRef = ref(storage, "eventImages/" + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);
    imageURL = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db,"events"),{
    title,
    date,
    description,
    registration,
    image: imageURL,
    createdAt: new Date()
  });

  document.getElementById("title").value="";
  document.getElementById("date").value="";
  document.getElementById("description").value="";
  document.getElementById("registration").value="";
  document.getElementById("imageFile").value="";

  loadEvents();
});

</script>

</body>
</html>
