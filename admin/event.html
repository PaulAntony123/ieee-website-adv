<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Events | IEEE SB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
    background:#070019;
    display:flex;
    color:#e5e7eb;
    overflow:hidden;   /* prevent whole page scroll */
}

h1{
  margin-bottom:30px;
  color:#a855f7;
}

.form-box{
  background:rgba(124,58,237,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(168,85,247,0.2);
  padding:25px;
  border-radius:20px;
  margin-bottom:40px;
}

.form-box h3{
  margin-bottom:15px;
  color:#a855f7;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#5b21b6,#7c3aed);
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.event-card{
  background:rgba(124,58,237,0.08);
  border:1px solid rgba(168,85,247,0.2);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}

.event-card img{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.delete-btn{
  background:#ff4d6d;
  margin-top:10px;
}
/* ================= SIDEBAR ================= */
.main{
    flex:1;
    padding:40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.search{
    background:rgba(124,58,237,0.08);
    padding:10px 20px;
    border-radius:30px;
    border:1px solid rgba(168,85,247,0.2);
}

.grid{
    display:grid;
    grid-template-columns:400px 1fr;
    gap:25px;
    height:calc(100vh - 120px);
}

/* LEFT CARD - STICKY */
.grid .card:first-child{
    position:sticky;
    top:0;
    height:fit-content;
}

/* RIGHT CARD - SCROLLABLE */
.grid .card:last-child{
    overflow-y:auto;
    padding-right:10px;
}

.card{
    background:rgba(124,58,237,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(168,85,247,0.2);
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 30px rgba(124,58,237,0.3);
}
/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    height:100vh;
    padding:30px 20px;
    background:rgba(124,58,237,0.08);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(168,85,247,0.2);
    box-shadow:0 0 40px rgba(124,58,237,0.3);
}

.sidebar h2{
    margin-bottom:40px;
    color:#a855f7;
    font-weight:600;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:12px 15px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.sidebar ul li:hover{
    background:rgba(168,85,247,0.2);
    box-shadow:0 0 20px rgba(124,58,237,0.5);
}

</style>
</head>

<body>

<div class="sidebar">
    <h2>IEEE SB</h2>
    <ul>
        <li onclick="window.location.href='dashboard.html'">📊 Dashboard</li>
        <li>📅 Events</li>
        <li>🖼️ Gallery</li>
        <li>👥 Team</li>
        <li>📝 Reports</li>
        <li>📩 Messages</li>
        <li>📂 Resources</li>
        <li>⚙️ Settings</li>
        <li id="logoutBtn">🚪 Logout</li>
    </ul>
</div>

<div class="main">

    <div class="topbar">
        <h1>Event Management</h1>
        <div class="search">📅 Manage Events</div>
    </div>

    <div class="grid">

        <div class="card">
            <h3>Add New Event</h3>

            <input type="text" id="title" placeholder="Event Title">
            <input type="date" id="date">
            <textarea id="description" placeholder="Event Description"></textarea>
            <input type="text" id="registration" placeholder="Registration Link (optional)">
            <input type="file" id="imageFile">
            <button id="addEvent">Add Event</button>
        </div>

        <div class="card">
            <h3>All Events</h3>
            <div id="eventList"></div>
        </div>

    </div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import { 
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  deleteDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";



/* 🔒 Protect Page */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

const eventList = document.getElementById("eventList");

/* ================= LOAD EVENTS ================= */

async function loadEvents(){
  eventList.innerHTML = "";
  const snapshot = await getDocs(collection(db,"events"));

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    const div = document.createElement("div");
    div.classList.add("event-card");

    div.innerHTML = `
      ${data.image ? `<img src="${data.image}">` : ""}
      <h4>${data.title}</h4>
      <p><strong>Date:</strong> ${data.date}</p>
      <p>${data.description || ""}</p>
      <button class="delete-btn" data-id="${docSnap.id}">Delete</button>
    `;

    eventList.appendChild(div);
  });

  document.querySelectorAll(".delete-btn").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const id = btn.getAttribute("data-id");
      await deleteDoc(doc(db,"events",id));
      loadEvents();
    });
  });
}

loadEvents();

/* ================= ADD EVENT ================= */

document.getElementById("addEvent").addEventListener("click", async ()=>{
  console.log("Button clicked");

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const description = document.getElementById("description").value;
  const registration = document.getElementById("registration").value;
  const file = document.getElementById("imageFile").files[0];

  if(!title || !date){
    alert("Title and Date required");
    return;
  }

  let imageURL = "";

  if(file){
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "ieee_events");

  const response = await fetch(
    "https://api.cloudinary.com/v1_1/dnbbyeel3/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await response.json();
  imageURL = data.secure_url;
}

  await addDoc(collection(db,"events"),{
    title,
    date,
    description,
    registration,
    image: imageURL,
    createdAt: new Date()
  });

  document.getElementById("title").value="";
  document.getElementById("date").value="";
  document.getElementById("description").value="";
  document.getElementById("registration").value="";
  document.getElementById("imageFile").value="";

  loadEvents();
});
import { signOut } from 
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🚪 Logout */
document.getElementById("logoutBtn")
  .addEventListener("click", () => {
    signOut(auth)
      .then(() => {
        window.location.href = "login.html";
      })
      .catch((error) => {
        console.error("Logout Error:", error);
      });
});
</script>

</body>
</html>
