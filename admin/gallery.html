<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Gallery | IEEE SB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#070019;
  display:flex;
  color:#e5e7eb;
}

.sidebar{
  width:260px;
  height:100vh;
  padding:30px 20px;
  background:rgba(124,58,237,0.08);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(168,85,247,0.2);
}

.sidebar h2{
  margin-bottom:40px;
  color:#a855f7;
}

.sidebar ul{
  list-style:none;
}

.sidebar ul li{
  padding:12px 15px;
  margin:10px 0;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}

.sidebar ul li:hover{
  background:rgba(168,85,247,0.2);
}

.main{
  flex:1;
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:400px 1fr;
  gap:25px;
}

.card{
  background:rgba(124,58,237,0.08);
  border:1px solid rgba(168,85,247,0.2);
  border-radius:20px;
  padding:25px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#5b21b6,#7c3aed);
  color:white;
  cursor:pointer;
}

.gallery-card{
  background:rgba(124,58,237,0.08);
  border:1px solid rgba(168,85,247,0.2);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}

.gallery-card img{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.delete-btn{
  background:#ff4d6d;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>IEEE SB</h2>
  <ul>
    <li onclick="window.location.href='dashboard.html'">📊 Dashboard</li>
    <li onclick="window.location.href='event.html'">📅 Events</li>
    <li>🖼️ Gallery</li>
    <li>👥 Team</li>
    <li>📝 Reports</li>
    <li>📩 Messages</li>
    <li>📂 Resources</li>
    <li>⚙️ Settings</li>
    <li id="logoutBtn">🚪 Logout</li>
  </ul>
</div>

<div class="main">

  <h1 style="color:#a855f7;margin-bottom:30px;">Gallery Management</h1>

  <div class="grid">

    <!-- LEFT UPLOAD FORM -->
    <div class="card">
      <h3>Add Gallery Image</h3>
      <input type="file" id="imageFile">
      <input type="text" id="caption" placeholder="Caption (optional)">
      <button id="addImage">Upload Image</button>
    </div>

    <!-- RIGHT LIST -->
    <div class="card">
      <h3>All Images</h3>
      <div id="galleryList"></div>
    </div>

  </div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { 
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* LOAD IMAGES */

const galleryList = document.getElementById("galleryList");

async function loadGallery(){
  galleryList.innerHTML="";
  const snapshot = await getDocs(collection(db,"gallery"));

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    const div = document.createElement("div");
    div.classList.add("gallery-card");

    div.innerHTML = `
      <img src="${data.imageUrl}">
      <p>${data.caption || ""}</p>
      <button class="delete-btn" data-id="${docSnap.id}">
        Delete
      </button>
    `;

    galleryList.appendChild(div);
  });

  document.querySelectorAll(".delete-btn").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const id = btn.getAttribute("data-id");
      await deleteDoc(doc(db,"gallery",id));
      loadGallery();
    });
  });
}

loadGallery();

/* ADD IMAGE */

document.getElementById("addImage")
  .addEventListener("click", async ()=>{

    const file = document.getElementById("imageFile").files[0];
    const caption = document.getElementById("caption").value;

    if(!file){
      alert("Select image first");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "ieee_gallery");

    const response = await fetch(
      "https://api.cloudinary.com/v1_1/dnbbyeel3/image/upload",
      {
        method:"POST",
        body:formData
      }
    );

    const data = await response.json();

    await addDoc(collection(db,"gallery"),{
      imageUrl:data.secure_url,
      caption:caption,
      createdAt:serverTimestamp()
    });

    document.getElementById("imageFile").value="";
    document.getElementById("caption").value="";

    loadGallery();
});
import { signOut } from 
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🚪 Logout */
document.getElementById("logoutBtn")
  .addEventListener("click", () => {
    signOut(auth)
      .then(() => {
        window.location.href = "login.html";
      })
      .catch((error) => {
        console.error("Logout Error:", error);
      });
});
</script>

</body>
</html>
